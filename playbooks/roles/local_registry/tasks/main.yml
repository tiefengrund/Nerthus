- name: Start local registry
  containers.podman.podman_container:
    name: tactical-registry
    image: registry:2
    state: started
    restart_policy: always
    pull: never
    network: host
    volumes:
      - "{{ tactical_base_dir }}/events/incoming"
      - "{{ tactical_base_dir }}/events/archive"
      - "{{ local_registry_data_dir }}:/var/lib/registry:Z"
      - "{{ tactical_pki_dir }}/registry.crt:/certs/domain.crt:ro,Z"
      - "{{ tactical_pki_dir }}/registry.key:/certs/domain.key:ro,Z"
    env:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_HTTP_TLS_CERTIFICATE: /certs/domain.crt
      REGISTRY_HTTP_TLS_KEY: /certs/domain.key
