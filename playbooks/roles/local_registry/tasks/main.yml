---
- name: Create tactical directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ tactical_base_dir }}"
    - "{{ local_registry_data_dir }}"
    - "{{ tactical_base_dir }}/captures/incoming"
    - "{{ tactical_base_dir }}/captures/parsed"
    - "{{ tactical_base_dir }}/captures/archive"
    - "{{ tactical_base_dir }}/logstash/pipeline"
    - "{{ tactical_base_dir }}/filebeat"
    - "{{ tactical_base_dir }}/grafana"
    - "{{ tactical_base_dir }}/parser"
- name: Ensure podman network exists
  containers.podman.podman_network:
    name: "{{ tactical_stack_network }}"
    state: present

