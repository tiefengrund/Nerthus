---
- name: Check internet reachability
  ansible.builtin.wait_for:
    host: docker.io
    port: 443
    timeout: 10
  register: internet_check
  failed_when: false
  changed_when: false
- name: Set online mode fact
  ansible.builtin.set_fact:
    we_are_online: '{{ internet_check is succeeded }}'
- name: Include OS-specific package preparation
  ansible.builtin.include_tasks: packages.yml
- name: Include Python virtual environment preparation
  ansible.builtin.include_tasks: venv.yml
- name: Include container runtime preparation
  ansible.builtin.include_tasks: container_runtime.yml
- name: Include optional network/firewall preparation
  ansible.builtin.include_tasks: firewall.yml
